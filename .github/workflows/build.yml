name: Build and Test Java Library

on: [push, pull_request]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: aarch64
          # - os: windows-latest
          #   arch: x86_64
          - os: ubuntu-latest
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      # Крок для отримання коду з репозиторію
      - uses: actions/checkout@v4

      # Налаштування JDK
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '11'
          cache: gradle

      # Збірка бібліотеки my_lib та публікація в локальний Maven репозиторій
      - name: Build and publish crud_jt-java to Maven local
        run: ./gradlew publishToMavenLocal

      # Збірка та запуск тестів з іншого проєкту test
      - name: Run tests in the test project
        working-directory: ./test
        run: ./gradlew run
