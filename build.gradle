plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.github.jnr:jnr-ffi:2.1.10'
    implementation 'org.msgpack:msgpack-core:0.9.0'
    implementation 'org.json:json:20230227'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

application {
    mainClass = 'TestCRUD_JT'  // Головний клас Java
    applicationDefaultJvmArgs = ['-Djava.library.path=/Users/macintosh/Applications/']
}
